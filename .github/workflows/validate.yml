name: Validate Encodings

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rac-us-co
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rac
        run: pip install git+https://github.com/RulesFoundation/rac.git@main

      - name: Validate rac-us-co repo
        run: python scripts/validate_repo.py
