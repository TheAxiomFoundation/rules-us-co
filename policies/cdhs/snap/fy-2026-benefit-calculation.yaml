format: rulespec/v1
module:
  summary: |-
    Colorado SNAP FY 2026 benefit calculation composition. This module imports
    the federal USDA FY 2026 maximum allotment parameters and Colorado manual
    sections for deductions, shelter, and allotments so final allotment tests
    exercise the composed programme rather than stubbing SNAP net income or
    upstream maximum allotment values.
imports:
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
  - us:statutes/7/2014/e/6/A
  - us-co:regulations/10-ccr-2506-1/4.407.1
  - us-co:regulations/10-ccr-2506-1/4.407.2
  - us-co:regulations/10-ccr-2506-1/4.407.3
  - us-co:regulations/10-ccr-2506-1/4.407.4
  - us-co:regulations/10-ccr-2506-1/4.407.5
  - us-co:regulations/10-ccr-2506-1/4.407.61
  - us-co:regulations/10-ccr-2506-1/4.207.3
  - us-co:regulations/10-ccr-2506-1/4.207.2
rules: []
