format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual restates the federal earned-income deduction.
    The executable deduction rate and calculation are imported from
    7 USC 2014(e)(2).
imports:
  - us:statutes/7/2014/e/2
rules:
  - name: co_snap_earned_income_deduction_reiterates_7_usc_2014_e_2
    kind: reiteration
    source: 10 CCR 2506-1 section 4.407.2
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    reiterates:
      target: us:statutes/7/2014/e/2#snap_earned_income_deduction
      authority: federal
      relationship: restates
    verification:
      values:
        snap_earned_income_deduction_rate: 0.20
