format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets FY 2026 monthly gross income limits
    effective October 1, 2025 for 130 percent, 165 percent, and 200 percent
    of the federal poverty level. For household sizes 1 through 8, the 130
    percent amounts are 1696, 2292, 2888, 3483, 4079, 4675, 5271, and 5867,
    plus 596 for each additional person. The 200 percent amounts are 2610,
    3526, 4442, 5360, 6276, 7192, 8110, and 9026, plus 918 for each
    additional person. The 165 percent amounts are 2152, 2909, 3665, 4421,
    5177, 5934, 6690, and 7446, plus 757 for each additional person.
rules:
  - name: gross_income_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.401.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_size > 8: 5867 + ((household_size - 8) * 596)
          else:
              match household_size:
                  1 => 1696
                  2 => 2292
                  3 => 2888
                  4 => 3483
                  5 => 4079
                  6 => 4675
                  7 => 5271
                  8 => 5867
  - name: snap_gross_income_limit_200_percent_fpl
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.401.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_size > 8: 9026 + ((household_size - 8) * 918)
          else:
              match household_size:
                  1 => 2610
                  2 => 3526
                  3 => 4442
                  4 => 5360
                  5 => 6276
                  6 => 7192
                  7 => 8110
                  8 => 9026
  - name: snap_gross_income_limit_165_percent_fpl
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.401.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_size > 8: 7446 + ((household_size - 8) * 757)
          else:
              match household_size:
                  1 => 2152
                  2 => 2909
                  3 => 3665
                  4 => 4421
                  5 => 5177
                  6 => 5934
                  7 => 6690
                  8 => 7446
