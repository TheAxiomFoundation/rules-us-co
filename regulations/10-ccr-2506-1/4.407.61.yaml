format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets a Standard Medical Expense Deduction
    (SMED) of 165 dollars beginning October 1, 2016. The SMED is used when
    verified medical expenses are greater than 35 dollars and less than or
    equal to the SMED. A household may claim actual expenses when verified
    expenses after deducting the first 35 dollars exceed the SMED.
rules:
  - name: snap_medical_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 sections 4.407.6 and 4.407.61
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2016-10-01'
        formula: '35'
  - name: snap_state_sme_flat_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.407.61
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2016-10-01'
        formula: '165'
  - name: medical_excess
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 sections 4.407.6 and 4.407.61
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2016-10-01'
        formula: max(0, total_medical_expenses - snap_medical_deduction_threshold)
  - name: medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 sections 4.407.6 and 4.407.61
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if elderly_or_disabled_household:
              if medical_excess > snap_state_sme_flat_amount:
                  medical_excess
              else:
                  if total_medical_expenses > snap_medical_deduction_threshold:
                      snap_state_sme_flat_amount
                  else: 0
          else: 0
