format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual prorates the initial month allotment from the
    application date through the end of the month, using the exact number of
    days in the calendar month. Residents of a public institution who apply
    jointly for SSI and SNAP before release use the release date instead of
    the application date. Migrant and seasonal farm worker households in the
    job stream receive the full month allotment when the break in
    participation does not exceed 30 days.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
imports:
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
  - us:statutes/7/2017/a
rules:
  - name: snap_initial_month_proration_start_date
    kind: derived
    entity: Household
    dtype: Date
    period: Month
    source: 10 CCR 2506-1 section 4.207.2(A)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if public_institution_joint_ssi_snap_application_before_release:
              public_institution_release_date
          else: application_date
  - name: snap_initial_month_proration_exception
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.2(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          migrant_or_seasonal_farmworker_household_in_job_stream
          and break_in_participation_days <= 30
  - name: snap_initial_month_proration_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.2
    versions:
      - effective_from: '2025-10-01'
        formula: initial_application_month and not snap_initial_month_proration_exception
  - name: snap_days_in_application_month
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 10 CCR 2506-1 section 4.207.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: days_between(period_start, date_add_days(period_end, 1))
  - name: snap_initial_month_proration_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 10 CCR 2506-1 section 4.207.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          days_between(
              snap_initial_month_proration_start_date,
              date_add_days(period_end, 1)
          )
  - name: snap_initial_month_proration_factor
    kind: derived
    entity: Household
    dtype: Rate
    period: Month
    source: 10 CCR 2506-1 section 4.207.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_initial_month_proration_days / snap_days_in_application_month
  - name: snap_initial_month_prorated_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: floor(snap_allotment_before_minimum * snap_initial_month_proration_factor)
  - name: snap_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 sections 4.207.2 and 4.207.3(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_eligible:
              if snap_initial_month_proration_applies:
                  if snap_initial_month_prorated_allotment < snap_minimum_monthly_allotment:
                      0
                  else: snap_initial_month_prorated_allotment
              else: snap_regular_month_allotment
          else: 0
