format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets income eligibility standards by
    household category. Expanded Categorical Eligibility (ECE) households must
    have gross income below 200 percent of the federal poverty level. Basic
    Categorical Eligibility (BCE) households are deemed to meet gross and net
    income limits. Standard eligibility households without a member aged 60 or
    older or with a disability must have gross income at or below 130 percent
    and net income at or below 100 percent of the federal poverty level.
    Standard eligibility households with a member aged 60 or older or with a
    disability must meet the 100 percent SNAP net income standard. An aged or
    disabled person unable to purchase and prepare meals may be a separate
    household when co-resident income does not exceed 165 percent of the
    poverty level.
imports:
  - us:statutes/7/2012/j
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
rules:
  - name: passes_gross_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.401(A)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_basic_categorical_eligible
          or (snap_expanded_categorical_eligible and gross_income < co_snap_expanded_categorical_gross_income_limit)
          or (
              (not snap_expanded_categorical_eligible)
              and (not snap_basic_categorical_eligible)
              and (snap_household_has_elderly_or_disabled_member or gross_income <= snap_gross_income_limit_130_percent_fpl_48_states_dc)
          )
  - name: passes_net_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.401(A)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_basic_categorical_eligible
          or snap_expanded_categorical_eligible
          or snap_net_income <= snap_net_income_limit_100_percent_fpl_48_states_dc
  - name: snap_income_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.401(A)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: passes_gross_income_test and passes_net_income_test
  - name: snap_elderly_disabled_separate_household_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.401(A)(4)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          elderly_disabled_person_unable_to_purchase_and_prepare_meals
          and co_resident_gross_income <= snap_gross_income_limit_165_percent_fpl_48_states_dc
