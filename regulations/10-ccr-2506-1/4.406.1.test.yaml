- name: destitute_household_counts_only_income_received_before_application
  period: 2026-01
  input:
    snap_destitute_income_household: true
    income_received_from_first_of_month_through_application_date: 300
    new_source_income_amount: 0
    new_source_income_received_or_anticipated_within_10_days: false
    normal_application_month_countable_income: 900
  output:
    snap_destitute_application_month_countable_income: 300
- name: untimely_new_source_income_over_threshold_is_disregarded
  period: 2026-01
  input:
    snap_destitute_income_household: true
    income_received_from_first_of_month_through_application_date: 500
    new_source_income_amount: 200
    new_source_income_received_or_anticipated_within_10_days: false
    normal_application_month_countable_income: 900
  output:
    snap_destitute_new_source_income_disregard: 200
    snap_destitute_application_month_countable_income: 300
- name: new_source_income_at_threshold_is_not_disregarded
  period: 2026-01
  input:
    new_source_income_amount: 25
    new_source_income_received_or_anticipated_within_10_days: false
  output:
    snap_destitute_new_source_income_disregard: 0
- name: initial_month_after_expired_certification_requires_proration
  period: 2026-01
  input:
    snap_destitute_income_household: true
    initial_month_application_or_after_certification_expired: true
  output:
    snap_destitute_initial_month_proration_required: holds
- name: employer_relocation_travel_advance_is_exempt
  period: 2026-01
  input:
    employer_travel_advance_reimburses_new_employee_relocation_travel_costs: true
    employer_travel_advance_amount: 450
  output:
    snap_destitute_travel_advance_exempt_income: 450
- name: written_wage_advance_counts_but_does_not_affect_new_source_status
  period: 2026-01
  input:
    travel_advance_is_written_contract_wage_advance_subtracted_from_later_wages: true
    employer_travel_advance_amount: 450
  output:
    snap_destitute_wage_advance_income: 450
    snap_destitute_wage_advance_affects_new_source_status: not_holds
