format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets FY 2026 monthly standard deduction
    amounts effective October 1, 2025 by household size: 209 for household
    sizes 1 through 3, 223 for household size 4, 261 for household size 5,
    and 299 for household sizes 6 or more.
rules:
  - name: standard_deduction_table
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: household_size
    source: 10 CCR 2506-1 section 4.407.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        values:
          1: 209
          2: 209
          3: 209
          4: 223
          5: 261
          6: 299
  - name: standard_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: standard_deduction_table[max(min(household_size, 6), 1)]
