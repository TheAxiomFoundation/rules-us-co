format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual restates the FY 2026 standard deduction
    amounts for the 48 states and District of Columbia. The executable
    standard deduction values are imported from the USDA SNAP FY 2026 COLA
    policy file.
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: co_snap_standard_deduction_reiterates_usda_fy_2026
    kind: reiteration
    source: 10 CCR 2506-1 section 4.407.1
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    reiterates:
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_standard_deduction
      authority: federal
      relationship: restates
    verification:
      values:
        snap_standard_deduction_48_states_dc_table:
          1: 209
          2: 209
          3: 209
          4: 223
          5: 261
          6: 299
