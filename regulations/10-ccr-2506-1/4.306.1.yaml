format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual lists exemptions from SNAP student
    ineligibility, including employment, work study, dependent-care, TANF,
    employment and training, and on-the-job training exemptions. This section
    restates the federal student exemptions in 7 CFR 273.5(b).
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306.1
imports:
  - us:regulations/7-cfr/273/5
rules:
  - name: co_snap_student_exemptions_reiterate_7_cfr_273_5
    kind: reiteration
    source: 10 CCR 2506-1 section 4.306.1
    reiterates:
      target: us:regulations/7-cfr/273/5#snap_student_exempt
      authority: federal
      relationship: restates
