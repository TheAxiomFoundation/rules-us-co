format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets FY 2026 monthly net income limits
    effective October 1, 2025 at 100 percent of the federal poverty level.
    For household sizes 1 through 8, the amounts are 1305, 1763, 2221, 2680,
    3138, 3596, 4055, and 4513, plus 459 for each additional person.
rules:
  - name: net_income_limit_table
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: household_size
    source: 10 CCR 2506-1 section 4.401.2
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        values:
          1: 1305
          2: 1763
          3: 2221
          4: 2680
          5: 3138
          6: 3596
          7: 4055
          8: 4513
  - name: net_income_limit_additional_member
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.401.2
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: '459'
  - name: net_income_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.401.2
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          net_income_limit_table[max(min(household_size, 8), 1)]
          + (max(household_size - 8, 0) * net_income_limit_additional_member)
