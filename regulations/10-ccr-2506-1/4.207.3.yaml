format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual determines monthly benefit allotments by
    multiplying net monthly income by 30 percent, subtracting that result from
    the maximum benefit for household size, and rounding the result down to
    the nearest dollar. Effective October 1, 2025, maximum monthly allotments
    are 298, 546, 785, 994, 1183, 1421, 1571, and 1789 for household sizes 1
    through 8, plus 218 for each additional person. The minimum monthly
    allotment for household sizes 1 through 2 is 24.
rules:
  - name: max_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3(D)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_size > 8: 1789 + ((household_size - 8) * 218)
          else:
              match household_size:
                  1 => 298
                  2 => 546
                  3 => 785
                  4 => 994
                  5 => 1183
                  6 => 1421
                  7 => 1571
                  8 => 1789
  - name: snap_minimum_monthly_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3(D)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_size <= 2: 24
          else: 0
  - name: snap_household_food_contribution_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.207.3(A)(1)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: '0.30'
  - name: net_income_for_benefit_formula
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3(A)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, net_income)
  - name: household_food_contribution
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3(A)(1)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: net_income_for_benefit_formula * snap_household_food_contribution_rate
  - name: snap_allotment_before_minimum
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3(A)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: floor(max(0, max_allotment - household_food_contribution))
  - name: snap_regular_month_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.207.3
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_eligible:
              if snap_allotment_before_minimum < snap_minimum_monthly_allotment:
                  snap_minimum_monthly_allotment
              else: snap_allotment_before_minimum
          else: 0
  - name: snap_application_denied_for_zero_benefit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.3(B)
    source_url: 'https://www.sos.state.co.us/CCR/GenerateRulePdf.do?ruleVersionId=12299&fileName=10%20CCR%202506-1'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not snap_basic_categorical_eligible)
          and (not snap_expanded_categorical_eligible)
          and household_size >= 3
          and snap_allotment_before_minimum == 0
          and (not initial_application_month)
